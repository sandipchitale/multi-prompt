<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Multi-Prompt — Tiled in a Tab</title>
  <style>
    :root {
      --bg: #f7f9fa;
      --panel: #ffffff;
      --border: #d8dee9;
      --text: #1a1d29;
      --muted: #5d6478;
    }
    [data-theme="dark"] {
      --bg: #0f111a;
      --panel: #161925;
      --border: #2a2f45;
      --text: #e7e9f0;
      --muted: #8a90a8;
    }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .panes { flex: 1; display: flex; min-height: 0; }
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
    }
    /* Draggable splitter between panes (panes flex-grow, splitter fixed width). */
    .splitter {
      flex: 0 0 6px;
      cursor: col-resize;
      background: var(--border);
      transition: background 0.15s ease;
    }
    .splitter:hover, .splitter.active { background: #7c3aed; }
    /* Covers the iframes during a drag so the parent keeps getting mouse events. */
    .drag-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      cursor: col-resize;
    }
    .pane { border-right: none; }
    .pane h2 {
      margin: 0;
      padding: 5px 8px 5px 12px;
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      cursor: grab;
      user-select: none;
    }
    .pane-title-spacer { flex: 1; }
    .pane-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--muted);
      width: 20px;
      height: 20px;
      padding: 0;
      border-radius: 5px;
      cursor: pointer;
    }
    .pane-btn:hover { background: var(--border); color: var(--text); }
    .pane-btn svg { display: block; }
    /* Drag handle hint: tiles reorder by dragging the titlebar; the grip makes
       that discoverable. Brightens when the titlebar is hovered. */
    .pane-grip {
      display: flex;
      color: var(--muted);
      opacity: 0.35;
      transition: opacity 0.15s ease;
      cursor: grab;
    }
    .pane h2:hover .pane-grip { opacity: 0.9; }
    /* Tile being dragged to a new position in the row. */
    .pane.dragging { opacity: 0.6; }
    .drag-overlay.reorder { cursor: grabbing; }
    /* Collapsed tile: a narrow sliver showing only the rotated titlebar. */
    .pane.collapsed {
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .pane.collapsed iframe { display: none; }
    .pane.collapsed h2 {
      flex: 1;
      writing-mode: vertical-rl;
      /* 9px top padding centres the 12px grip on the same line as the grips
         in the neighbouring expanded titlebars (5px padding + 20px row). */
      padding: 9px 4px 12px;
      border-bottom: none;
      /* A click anywhere on the strip expands the tile. */
      cursor: pointer;
    }
    .pane.collapsed h2:hover { background: rgba(124, 58, 237, 0.10); }
    /* Sliver stacking: grip (reorder) on top, then the rotated title. */
    .pane.collapsed .pane-grip { order: -1; }
    .pane-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      vertical-align: middle;
      background: var(--muted);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }
    .pane-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 5px rgba(34, 197, 94, 0.7);
    }
    .pane-dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 5px rgba(239, 68, 68, 0.7);
    }
    /* Last-broadcast result for this pane (… sending / ✓ delivered / ✗ failed). */
    .pane-result { font-size: 11px; font-weight: 700; }
    .pane-result.pending { color: var(--muted); }
    .pane-result.ok { color: #22c55e; }
    .pane-result.fail { color: #ef4444; }
    .pane iframe { flex: 1; width: 100%; border: 0; background: #fff; }
    .composer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      background: var(--panel);
      border-top: 1px solid var(--border);
    }
    /* The shared prompt is the star: a full-width pill with a slowly drifting
       multicolor border and a soft glow — eye-catching, not overpowering. */
    .prompt-shell {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      min-width: 0;
      box-sizing: border-box;
      padding: 5px 5px 5px 20px;
      border: 2px solid transparent;
      border-radius: 999px;
      background:
        linear-gradient(var(--panel), var(--panel)) padding-box,
        linear-gradient(120deg, #7c3aed, #d946ef, #06b6d4, #22c55e, #7c3aed) border-box;
      background-size: 100% 100%, 300% 300%;
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.22);
      transition: box-shadow 0.2s ease;
    }
    /* When the prompt grows to multiple lines, a full pill looks broken —
       relax to a rounded rect. */
    .prompt-shell.multiline { border-radius: 24px; }
    @media (prefers-reduced-motion: no-preference) {
      .prompt-shell { animation: prompt-glow-pan 8s linear infinite; }
    }
    .prompt-shell:focus-within {
      box-shadow: 0 0 20px rgba(124, 58, 237, 0.38);
    }
    @keyframes prompt-glow-pan {
      0%   { background-position: 0 0, 0% 50%; }
      50%  { background-position: 0 0, 100% 50%; }
      100% { background-position: 0 0, 0% 50%; }
    }
    #prompt {
      flex: 1;
      height: 40px;
      max-height: 100px;
      overflow-y: auto;
      resize: none;
      box-sizing: border-box;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
    }
    #prompt:focus { outline: none; }
    #send {
      height: 38px;
      min-width: 108px; /* fits the in-flight "Sending…" label without resizing */
      padding: 0 22px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #7c3aed 0%, #d946ef 100%);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    #send:disabled { opacity: 0.5; cursor: default; }
    /* Only used for whole-broadcast failures; per-pane results live in the
       pane titlebars. Hidden when empty so it doesn't reserve row space. */
    #status { font-size: 11px; color: #ef4444; max-width: 240px; }
    #status:empty { display: none; }
    /* Match the prompt pill's outer height (textarea 40 + 5px padding and 2px
       border each side = 54) so the whole bottom bar reads as one row of pills. */
    #ws-export-format {
      height: 54px;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: inherit;
      font: inherit;
      padding: 0 42px 0 24px;
      /* Native selects pin their arrow against the right edge, which collides
         with the pill curve — draw our own chevron, inset from the border. */
      appearance: none;
      -webkit-appearance: none;
      background-color: var(--bg);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%235d6478' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 20px center;
    }
    [data-theme="dark"] #ws-export-format {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%238a90a8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    }
    #ws-export {
      height: 54px;
      box-sizing: border-box;
      padding: 0 20px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    #ws-export:disabled { opacity: 0.5; cursor: default; }
    /* Theme selector pill, matching the popup's segmented toggle. */
    .theme-toggle {
      height: 54px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
    }
    .theme-toggle label { cursor: pointer; }
    /* Visually hidden but still focusable, so the radio group stays keyboard
       operable (arrow keys switch theme). */
    .theme-toggle input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      margin: 0;
      pointer-events: none;
    }
    /* 44px inner pills inside the 54px group: the 4px gutter (+1px border)
       keeps the inner curves concentric with the outer rounded corner. */
    .theme-toggle span {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      box-sizing: border-box;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.2s ease;
    }
    .theme-toggle input:checked + span {
      background: #7c3aed;
      color: #fff;
      box-shadow: 0 0 8px rgba(124, 58, 237, 0.5);
    }
    /* Keyboard focus rings (mouse clicks don't trigger :focus-visible). */
    .pane-btn:focus-visible,
    #send:focus-visible,
    #ws-export:focus-visible,
    #ws-export-format:focus-visible {
      outline: 2px solid #7c3aed;
      outline-offset: 2px;
    }
    .theme-toggle input:focus-visible + span {
      outline: 2px solid #7c3aed;
      outline-offset: 2px;
    }
    .notice {
      margin: auto;
      max-width: 480px;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="panes" id="panes">
    <div class="notice">Loading panes…</div>
  </div>
  <div class="composer">
    <div class="prompt-shell">
      <textarea id="prompt"
        placeholder="Type a prompt — Enter sends it to every pane (Shift+Enter for a newline)"></textarea>
      <button id="send" type="button">Send</button>
    </div>
    <span id="status"></span>
    <select id="ws-export-format" title="Export format">
      <option value="markdown">Markdown (.md)</option>
      <option value="pdf">PDF / Print (.pdf)</option>
    </select>
    <button id="ws-export" type="button" title="Export this tab's chats">Export</button>
    <div class="theme-toggle" title="Select Theme">
      <label>
        <input type="radio" name="theme" value="auto" checked />
        <span>Auto</span>
      </label>
      <label>
        <input type="radio" name="theme" value="light" />
        <span>☀️</span>
      </label>
      <label>
        <input type="radio" name="theme" value="dark" />
        <span>🌙</span>
      </label>
    </div>
  </div>
  <script src="align.js"></script>
  <script src="workspace.js"></script>
</body>
</html>
