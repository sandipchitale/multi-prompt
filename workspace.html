<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Multi-Prompt — Tiled in a Tab</title>
  <link rel="stylesheet" href="bar.css">
  <style>
    /* Colour vars, body layout, and all bottom-bar styling live in bar.css;
       only the workspace's tile/pane/splitter chrome is page-specific. */
    :root { --sliver-width: 28px; } /* collapsed-tile strip; JS sizes panes from this too */
    .panes { flex: 1; display: flex; min-height: 0; }
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
    }
    /* Draggable splitter between panes (panes flex-grow, splitter fixed width). */
    .splitter {
      flex: 0 0 6px;
      cursor: col-resize;
      background: var(--border);
      transition: background 0.15s ease;
    }
    .splitter:hover, .splitter.active { background: #7c3aed; }
    /* Covers the iframes during a drag so the parent keeps getting mouse events. */
    .drag-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      cursor: col-resize;
    }
    .pane { border-right: none; }
    .pane h2 {
      margin: 0;
      padding: 5px 8px 5px 12px;
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 0 0 auto;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      cursor: grab;
      user-select: none;
    }
    .pane-title-spacer { flex: 1; }
    .pane-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--muted);
      width: 20px;
      height: 20px;
      padding: 0;
      border-radius: 5px;
      cursor: pointer;
    }
    .pane-btn:hover { background: var(--border); color: var(--text); }
    .pane-btn svg { display: block; }
    /* Drag handle hint: tiles reorder by dragging the titlebar; the grip makes
       that discoverable. Brightens when the titlebar is hovered. */
    .pane-grip {
      display: flex;
      color: var(--muted);
      opacity: 0.35;
      transition: opacity 0.15s ease;
      cursor: grab;
    }
    .pane h2:hover .pane-grip { opacity: 0.9; }
    /* Tile being dragged to a new position in the row. */
    .pane.dragging { opacity: 0.6; }
    .drag-overlay.reorder { cursor: grabbing; }
    /* Collapsed tile: a narrow sliver showing only the rotated titlebar. */
    .pane.collapsed {
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .pane.collapsed iframe { display: none; }
    .pane.collapsed h2 {
      flex: 1;
      writing-mode: vertical-rl;
      /* 9px top padding centres the 12px grip on the same line as the grips
         in the neighbouring expanded titlebars (5px padding + 20px row). */
      padding: 9px 4px 12px;
      border-bottom: none;
      /* A click anywhere on the strip expands the tile. */
      cursor: pointer;
    }
    .pane.collapsed h2:hover { background: rgba(124, 58, 237, 0.10); }
    /* Sliver stacking: grip (reorder) on top, then the rotated title. */
    .pane.collapsed .pane-grip { order: -1; }
    /* Ghost = this pane is in private/temporary chat mode (status-polled). */
    .pane-ghost { display: none; color: #7c3aed; }
    .pane-ghost.on { display: flex; }
    .pane iframe { flex: 1; width: 100%; border: 0; background: #fff; }
    /* Keyboard focus ring for the tile titlebar buttons (the bar controls'
       focus styling is in bar.css). */
    .pane-btn:focus-visible {
      outline: 2px solid #7c3aed;
      outline-offset: 2px;
    }
    .notice {
      margin: auto;
      max-width: 480px;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="panes" id="panes">
    <div class="notice">Loading panes…</div>
  </div>
  <div class="composer">
    <button id="ws-menu" class="bar-menu" type="button"
      title="Open the Multi-Prompt panel — model selection, tile order, saved sessions, export">M</button>
    <div class="prompt-shell">
      <!-- rows=1: without it the browser default (rows=2) makes height:auto
           measure two lines tall, so the first keystroke ratcheted the shell
           from 54px to 73px for good (MPBar.autosize measures via height:auto). -->
      <textarea id="prompt" rows="1"
        placeholder="Type a prompt — Enter sends it to every pane (Shift+Enter for a newline)"></textarea>
      <button id="send" type="button">Send</button>
    </div>
    <span id="status"></span>
    <!-- Enter-key option for THIS prompt box. Shares the `paneSwapEnter` pref with
         the switch content/enter-option.js injects into each chatbot's composer
         (and with the Tiled-Windows prompt bar), so all of them stay in lockstep.
         Hidden by JS when the popup's Enter-key option is off. -->
    <div class="bar-enter" id="ws-enter">
      <span class="bar-enter-label">Enter:</span>
      <span title="Enter sends the prompt">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="currentColor" aria-hidden="true">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </span>
      <label class="bar-enter-switch">
        <input type="checkbox" />
        <span class="slider"><span class="knob"></span></span>
      </label>
      <span title="Enter adds a new line">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="currentColor" aria-hidden="true">
          <path d="M19 7v4H5.83l3.58-3.59L8 6l-6 6 6 6 1.41-1.41L5.83 13H21V7h-2z"></path>
        </svg>
      </span>
    </div>
    <button id="ws-private" class="bar-private" type="button"
      title="Switch all panes to private/temporary chat — this chat will NOT be saved to Saved Sessions">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 10h.01"></path>
        <path d="M15 10h.01"></path>
        <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"></path>
      </svg>
      <span id="ws-private-label">Private</span>
    </button>
    <select id="ws-export-format" class="bar-select" title="Export format">
      <option value="markdown">Markdown (.md)</option>
      <option value="pdf">PDF / Print (.pdf)</option>
    </select>
    <button id="ws-export" class="bar-btn" type="button" title="Export this tab's chats">Export</button>
    <div class="theme-toggle" title="Select Theme">
      <label>
        <input type="radio" name="theme" value="auto" checked />
        <span>Auto</span>
      </label>
      <label>
        <input type="radio" name="theme" value="light" />
        <span>☀️</span>
      </label>
      <label>
        <input type="radio" name="theme" value="dark" />
        <span>🌙</span>
      </label>
    </div>
  </div>
  <script src="align.js"></script>
  <script src="bar-common.js"></script>
  <script src="workspace.js"></script>
</body>
</html>
