<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Multi-Prompt — Shared Prompt</title>
  <link rel="stylesheet" href="bar.css">
  <style>
    /* Prompt-bar-only chrome; the shared bottom-bar styling lives in bar.css. */

    /* Per-model delivery strip — the bar is where the user acts, so feedback
       lives here (tiled chatbots are separate OS windows with no shared
       titlebar). Mirrors the Tiled-in-a-Tab pane titlebar indicators. */
    .chips {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 0 0 auto;
      padding: 6px 12px 0;
      min-height: 22px;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
    }
    /* Keep an empty badge from collapsing so chips don't reflow when … appears. */
    .chip .pane-result { min-width: 8px; }
    /* The composer fills the height below the chips row (unlike the workspace,
       where it's auto height beneath the panes). */
    .composer { flex: 1; }
    /* The [M] panel button is styled by the shared .bar-menu class in bar.css. */
  </style>
</head>
<body>
  <div class="chips" id="chips"></div>
  <div class="composer">
    <button id="pb-menu" class="bar-menu" type="button"
      title="Open the Multi-Prompt panel — model selection, tile order, saved sessions, export">M</button>
    <div class="prompt-shell">
      <textarea id="prompt" rows="1"
        placeholder="Type a prompt — Enter sends it to every tiled window (Shift+Enter for a newline)"></textarea>
      <button id="send" type="button">Send</button>
    </div>
    <span id="status"></span>
    <!-- Enter-key mode for THIS prompt box. Shares the `paneSwapEnter` pref with
         the switch content/enter-option.js injects into each chatbot's composer,
         so the two stay in lockstep. Hidden by JS when the popup's Enter-key
         option is off. Sits beside the prompt it governs. -->
    <div class="bar-enter" id="pb-enter">
      <span class="bar-enter-label">Enter:</span>
      <span title="Enter sends the prompt">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="currentColor" aria-hidden="true">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </span>
      <label class="bar-enter-switch">
        <input type="checkbox" />
        <span class="slider"><span class="knob"></span></span>
      </label>
      <span title="Enter adds a new line">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="currentColor" aria-hidden="true">
          <path d="M19 7v4H5.83l3.58-3.59L8 6l-6 6 6 6 1.41-1.41L5.83 13H21V7h-2z"></path>
        </svg>
      </span>
    </div>
    <button id="pb-private" class="bar-private" type="button"
      title="Switch all tiled windows to private/temporary chat — this chat will NOT be saved to Saved Sessions">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 10h.01"></path>
        <path d="M15 10h.01"></path>
        <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"></path>
      </svg>
      <span id="pb-private-label">Private</span>
    </button>
    <select id="pb-export-format" class="bar-select" title="Export format">
      <option value="markdown">Markdown (.md)</option>
      <option value="pdf">PDF / Print (.pdf)</option>
    </select>
    <button id="pb-export" class="bar-btn" type="button" title="Export the tiled windows' chats">Export</button>
    <div class="theme-toggle" title="Select Theme">
      <label>
        <input type="radio" name="theme" value="auto" checked />
        <span>Auto</span>
      </label>
      <label>
        <input type="radio" name="theme" value="light" />
        <span>☀️</span>
      </label>
      <label>
        <input type="radio" name="theme" value="dark" />
        <span>🌙</span>
      </label>
    </div>
  </div>
  <script src="align.js"></script>
  <script src="bar-common.js"></script>
  <script src="promptbar.js"></script>
</body>
</html>
