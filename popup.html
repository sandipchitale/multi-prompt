<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Multi-Prompt</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo-icon">M</div>
        <h2>Multi-Prompt</h2>

        <div class="theme-toggle" title="Select Theme">
          <label>
            <input type="radio" name="theme" value="auto" checked />
            <span>Auto</span>
          </label>
          <label>
            <input type="radio" name="theme" value="light" />
            <span>☀️</span>
          </label>
          <label>
            <input type="radio" name="theme" value="dark" />
            <span>🌙</span>
          </label>
        </div>
      </div>

      <p class="subtitle">
        Active Chatbots &mdash; drag to set tile order (left → right):
      </p>

      <div id="chatbots-list" class="cards-container">
        <!-- Dynamically populated -->
      </div>

      <div id="error-msg" class="status-msg error hidden">
        Please select at least 1 chatbot.
      </div>

      <div class="toggle-pair">
        <label
          id="private-row"
          class="private-row"
          title="Start every new chat in the site's private/temporary mode (clicked automatically as the chats open). Private chats are NOT saved to Saved Sessions."
        >
          <input id="private-chat" type="checkbox" />
          <svg
            class="private-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 10h.01"></path>
            <path d="M15 10h.01"></path>
            <path
              d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
            ></path>
          </svg>
          <span class="private-label">Private / temporary chats
            <span class="private-hint">not saved</span>
          </span>
          <span class="toggle-indicator"></span>
        </label>
      </div>

      <div class="toggle-pair">
        <label
          id="enter-option-row"
          class="private-row"
          title="Show the Enter-key option in each chatbot's prompt box and in the shared prompt bar: a small switch (with Ctrl+Enter shortcut) that swaps Enter and Shift+Enter, so Enter adds a new line and Shift+Enter sends to every pane. The setting is shared, so flipping it anywhere flips it everywhere. When off, the switch is hidden and Enter behaves normally (sends)."
        >
          <input id="enter-option" type="checkbox" />
          <svg
            class="private-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="9 10 4 15 9 20"></polyline>
            <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
          </svg>
          <span class="private-label">Enter-key option in prompt boxes</span>
          <span class="toggle-indicator"></span>
        </label>

        <label
          id="broadcast-on-type-row"
          class="private-row"
          title="When on, typing directly in one chatbot's prompt box also sends to every other chatbot. When off (default), it sends only to that chatbot — use the shared prompt box to send to all."
        >
          <input id="broadcast-on-type" type="checkbox" />
          <svg
            class="private-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4.93 19.07a10 10 0 0 1 0-14.14"></path>
            <path d="M7.76 16.24a6 6 0 0 1 0-8.48"></path>
            <path d="M16.24 7.76a6 6 0 0 1 0 8.48"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
            <circle cx="12" cy="12" r="2"></circle>
          </svg>
          <span class="private-label">Broadcast prompt to other chatbots</span>
          <span class="toggle-indicator"></span>
        </label>
      </div>

      <div class="button-group">
        <div class="button-row">
          <button
            id="new-chat-btn"
            class="glow-button outline"
            title="Tiled-windows mode: tile the selected models in separate OS windows and start a fresh chat (and a new saved session)"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 20h9"></path>
              <path
                d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
              ></path>
            </svg>
            <span class="btn-text">New Chat (Tiled Windows)</span>
          </button>
          <button
            id="close-tiles-btn"
            class="glow-button outline"
            title="Close all tiled chatbot windows"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="15"></line>
              <line x1="15" y1="9" x2="9" y2="15"></line>
            </svg>
            <span class="btn-text">Close Tiled Windows</span>
          </button>
        </div>
        <div class="button-row">
          <button
            id="workspace-btn"
            class="glow-button outline"
            title="Tiled-in-a-Tab mode (experimental): open the selected chatbots as iframes tiled inside one browser tab with a shared prompt box, and start a fresh chat"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
              <line x1="15" y1="3" x2="15" y2="21"></line>
            </svg>
            <span class="btn-text">New Chat (Tiled in a Tab)</span>
          </button>
        </div>
      </div>

      <!-- Export Chats Section -->
      <div id="export-section" class="export-section">
        <p class="subtitle">Export Chat History:</p>
        <div class="export-controls">
          <select id="export-format" class="export-select" title="Choose export format">
            <option value="markdown">Markdown (.md)</option>
            <option value="pdf">PDF / Print (.pdf)</option>
          </select>
          <button
            id="export-btn"
            class="glow-button outline mini"
            title="Export conversation history from active chatbots"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span class="btn-text">Export</span>
          </button>
        </div>
      </div>

      <!-- Saved Sessions Section -->
      <div id="sessions-section" class="sessions-section">
        <p class="subtitle">Saved Sessions:</p>
        <div class="sessions-controls">
          <button
            id="session-delete-btn"
            class="session-action delete"
            title="Delete the selected session"
            disabled
          >✕</button>
          <select id="sessions-select" class="export-select" title="Choose a saved session">
            <option value="">No saved sessions</option>
          </select>
          <button
            id="session-rename-btn"
            class="session-action"
            title="Rename the selected session"
            disabled
          >✎</button>
          <button
            id="session-open-btn"
            class="glow-button outline mini"
            title="Reopen the selected session as tiled OS windows"
            disabled
          >
            <span class="btn-text">Tiled Windows</span>
          </button>
          <button
            id="session-open-workspace-btn"
            class="glow-button outline mini"
            title="Reopen the selected session as iframes tiled inside one browser tab (experimental)"
            disabled
          >
            <span class="btn-text">Tiled in a Tab</span>
          </button>
        </div>
        <div id="session-rename-row" class="sessions-rename-row hidden">
          <input
            id="session-rename-input"
            type="text"
            class="session-rename-input"
            placeholder="Session name"
            maxlength="100"
          />
          <button
            id="session-rename-save"
            class="glow-button outline mini"
            title="Save the new name"
          >
            <span class="btn-text">Save</span>
          </button>
          <button
            id="session-rename-cancel"
            class="session-action"
            title="Cancel renaming"
          >✕</button>
        </div>
      </div>
    </div>

    <script src="align.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
