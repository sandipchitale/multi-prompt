<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Multi-Prompt</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo-icon">M</div>
        <h2>Multi-Prompt</h2>

        <div class="theme-toggle" title="Select Theme">
          <label>
            <input type="radio" name="theme" value="auto" checked />
            <span>Auto</span>
          </label>
          <label>
            <input type="radio" name="theme" value="light" />
            <span>☀️</span>
          </label>
          <label>
            <input type="radio" name="theme" value="dark" />
            <span>🌙</span>
          </label>
        </div>
      </div>

      <p class="subtitle">Select active Chatbots:</p>

      <div class="cards-container">
        <!-- Gemini Card -->
        <label class="model-card gemini-card" for="gemini">
          <input type="checkbox" id="gemini" value="gemini" class="ai-checkbox" />
          <div class="card-content">
            <div class="model-avatar gemini-avatar">G</div>
            <span class="model-name">Gemini</span>
            <div class="toggle-indicator"></div>
          </div>
        </label>

        <!-- Claude Card -->
        <label class="model-card claude-card" for="claude">
          <input type="checkbox" id="claude" value="claude" class="ai-checkbox" />
          <div class="card-content">
            <div class="model-avatar claude-avatar">C</div>
            <span class="model-name">Claude</span>
            <div class="toggle-indicator"></div>
          </div>
        </label>

        <!-- ChatGPT Card -->
        <label class="model-card chatgpt-card" for="chatgpt">
          <input type="checkbox" id="chatgpt" value="chatgpt" class="ai-checkbox" />
          <div class="card-content">
            <div class="model-avatar chatgpt-avatar">GPT</div>
            <span class="model-name">ChatGPT</span>
            <div class="toggle-indicator"></div>
          </div>
        </label>
      </div>

      <!-- Layout Preview Section -->
      <div id="layout-preview-section" class="layout-preview-section hidden">
        <p class="subtitle">Window Tile Order (Left to Right):</p>
        <div id="layout-preview-container" class="layout-preview-container">
          <!-- Dynamically populated -->
        </div>
      </div>

      <div id="error-msg" class="status-msg error hidden">
        Please select at least 1 chatbot.
      </div>

      <div class="button-group">
        <div class="button-row">
          <button
            id="new-chat-btn"
            class="glow-button outline"
            title="Tile the selected models if needed, then start a fresh chat (and a new saved session)"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 20h9"></path>
              <path
                d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
              ></path>
            </svg>
            <span class="btn-text">New Chat</span>
          </button>
          <button
            id="close-tiles-btn"
            class="glow-button outline"
            title="Close all tiled chatbot windows"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="9" x2="15" y2="15"></line>
              <line x1="15" y1="9" x2="9" y2="15"></line>
            </svg>
            <span class="btn-text">Close Tiles</span>
          </button>
        </div>
      </div>

      <!-- Export Chats Section -->
      <div id="export-section" class="export-section">
        <p class="subtitle">Export Chat History:</p>
        <div class="export-controls">
          <select id="export-format" class="export-select" title="Choose export format">
            <option value="markdown">Markdown (.md)</option>
            <option value="pdf">PDF / Print (.pdf)</option>
          </select>
          <button
            id="export-btn"
            class="glow-button outline mini"
            title="Export conversation history from active chatbots"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span class="btn-text">Export</span>
          </button>
        </div>
      </div>

      <!-- Saved Sessions Section -->
      <div id="sessions-section" class="sessions-section">
        <p class="subtitle">Saved Sessions:</p>
        <div class="sessions-controls">
          <select id="sessions-select" class="export-select" title="Choose a saved session">
            <option value="">No saved sessions</option>
          </select>
          <button
            id="session-open-btn"
            class="glow-button outline mini"
            title="Reopen and tile the selected session"
            disabled
          >
            <span class="btn-text">Open</span>
          </button>
          <button
            id="session-delete-btn"
            class="session-action delete"
            title="Delete the selected session"
            disabled
          >✕</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
