<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Prompt Chat Export</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

    :root {
      --bg-color: #0f111a;
      --panel-bg: #161925;
      --text-main: #f0f0f0;
      --text-muted: #8b92a5;
      --border-color: rgba(255, 255, 255, 0.08);
      --user-bubble-bg: #2b304a;
      --user-bubble-text: #ffffff;
      
      --gemini-color: #1a73e8;
      --gemini-bg: rgba(26, 115, 232, 0.1);
      --claude-color: #d97752;
      --claude-bg: rgba(217, 119, 82, 0.1);
      --chatgpt-color: #10a37f;
      --chatgpt-bg: rgba(16, 163, 127, 0.1);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f7f9fa;
        --panel-bg: #ffffff;
        --text-main: #141620;
        --text-muted: #6b7280;
        --border-color: rgba(0, 0, 0, 0.08);
        --user-bubble-bg: #e2e8f0;
        --user-bubble-text: #1e293b;
        
        --gemini-bg: rgba(26, 115, 232, 0.05);
        --claude-bg: rgba(217, 119, 82, 0.05);
        --chatgpt-bg: rgba(16, 163, 127, 0.05);
      }
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 40px 24px;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #5a32fa, #ff32ca);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .meta-info {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: right;
    }

    .chatbot-section {
      margin-bottom: 50px;
      background-color: var(--panel-bg);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      break-inside: avoid;
    }

    .chatbot-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .chatbot-avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 1rem;
    }

    .gemini-avatar { background: linear-gradient(135deg, #1a73e8, #8ab4f8); }
    .claude-avatar { background: #d97752; }
    .chatgpt-avatar { background: #10a37f; font-size: 0.85rem; }

    .chatbot-name {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .messages-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 90%;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 0.95rem;
      break-inside: avoid;
    }

    .message.user {
      align-self: flex-end;
      background-color: var(--user-bubble-bg);
      color: var(--user-bubble-text);
      border-bottom-right-radius: 2px;
    }

    .message.assistant {
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .gemini .message.assistant {
      background-color: var(--gemini-bg);
      border-left: 4px solid var(--gemini-color);
    }

    .claude .message.assistant {
      background-color: var(--claude-bg);
      border-left: 4px solid var(--claude-color);
    }

    .chatgpt .message.assistant {
      background-color: var(--chatgpt-bg);
      border-left: 4px solid var(--chatgpt-color);
    }

    .message-role {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .user .message-role { color: var(--text-muted); opacity: 0.8; }
    .gemini .assistant .message-role { color: var(--gemini-color); }
    .claude .assistant .message-role { color: var(--claude-color); }
    .chatgpt .assistant .message-role { color: var(--chatgpt-color); }

    .message-content {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Markdown styling inside messages */
    .message-content p {
      margin: 0 0 12px 0;
    }
    .message-content p:last-child {
      margin-bottom: 0;
    }

    .message-content pre {
      background-color: rgba(0, 0, 0, 0.15);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .message-content code {
      font-family: 'Fira Code', monospace;
      font-size: 0.85em;
      background-color: rgba(0, 0, 0, 0.05);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .message-content pre code {
      background-color: transparent;
      padding: 0;
      border-radius: 0;
      display: block;
      line-height: 1.4;
    }

    .message-content ul, .message-content ol {
      margin: 0 0 12px 0;
      padding-left: 20px;
    }

    .message-content li {
      margin-bottom: 6px;
    }

    .message-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9em;
    }

    .message-content th, .message-content td {
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      text-align: left;
    }

    .message-content th {
      background-color: rgba(0, 0, 0, 0.05);
      font-weight: 600;
    }

    .message-content blockquote {
      border-left: 4px solid var(--text-muted);
      margin: 12px 0;
      padding: 4px 16px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Print settings */
    @media print {
      body {
        background-color: white !important;
        color: black !important;
        padding: 0 !important;
      }
      .chatbot-section {
        box-shadow: none !important;
        border: 1px solid #ccc !important;
        margin-bottom: 30px !important;
        background-color: white !important;
        page-break-after: auto;
      }
      .message.user {
        background-color: #f1f5f9 !important;
        color: black !important;
        border: 1px solid #e2e8f0 !important;
      }
      .message.assistant {
        background-color: #f8fafc !important;
        color: black !important;
        border: 1px solid #e2e8f0 !important;
      }
      h1 {
        background: none !important;
        color: black !important;
        -webkit-text-fill-color: initial !important;
      }
      .no-print {
        display: none !important;
      }
    }

    .action-bar {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 24px;
    }

    .btn {
      background-color: #5a32fa;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #4824d6;
    }

    .btn.secondary {
      background-color: transparent;
      border: 1px solid var(--text-muted);
      color: var(--text-main);
    }

    .btn.secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="action-bar no-print">
      <button id="close-btn" class="btn secondary">Close Window</button>
      <button id="print-btn" class="btn">Print / Save as PDF</button>
    </div>

    <header>
      <div>
        <h1>Multi-Prompt Chat Transcript</h1>
      </div>
      <div class="meta-info">
        <div>Exported on: <span id="export-date">-</span></div>
      </div>
    </header>

    <main id="chat-content">
      <p style="text-align: center; color: var(--text-muted);">Loading conversation transcripts...</p>
    </main>
  </div>

  <script src="export.js"></script>
</body>
</html>
